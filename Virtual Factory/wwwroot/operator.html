<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Factory - Operator Console</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 20px; background: #f4f6f8; color: #222; }
        h1 { margin-bottom: 8px; }
        .subtext { margin-bottom: 16px; color: #666; }
        nav a { margin-right: 12px; }
        .layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 16px; align-items: flex-start; }
        .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        .field-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .05em; color: #666; margin-top: 8px; }
        .field-value { font-size: 1rem; font-weight: 600; margin-top: 2px; }
        select { width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid #ccc; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
        .badge-green { background:#dcfce7;color:#166534; }
        .badge-red { background:#fee2e2;color:#991b1b; }
        .badge-gray { background:#e5e7eb;color:#374151; }
        .progress-bar { position: relative; height: 10px; border-radius: 999px; background:#e5e7eb; overflow:hidden; margin-top:4px; }
        .progress-fill { position:absolute;left:0;top:0;bottom:0;background:#2563eb; }
        .assistant-badges { margin-top:8px; margin-bottom:4px; min-height: 18px; }
        .badge.warning { display:inline-block; padding:3px 8px; border-radius:999px; font-size:0.75rem; font-weight:600; background:#f97316; color:#111827; margin-right:4px; margin-bottom:2px; cursor:pointer; border:none; }
        .badge.warning.active { outline:2px solid #fff; outline-offset:2px; }
        .badge-detail { display:none; padding:6px 10px; margin:4px 0 2px; background:#1f2937; border-radius:6px; font-size:0.8rem; color:#d1d5db; line-height:1.4; white-space:pre-wrap; }
        .badge-detail.open { display:block; }
        #assistantResponse { white-space: pre-wrap; font-size:0.9rem; line-height:1.4; }
        .last-updated { font-size:0.75rem; color:#9ca3af; margin-top:6px; margin-bottom:2px; }
        button { padding: 8px 14px; border-radius: 6px; border:none; background:#2563eb; color:#fff; cursor:pointer; font-size:0.9rem; }
        button:disabled { opacity:0.6; cursor:default; }
        .breadcrumb { font-size:0.8rem; color:#6b7280; margin-bottom:6px; }
        .breadcrumb a { color:#2563eb; text-decoration:none; }
        .breadcrumb a:hover { text-decoration:underline; }
        .breadcrumb span { margin:0 4px; }
    </style>
</head>
<body>
    <nav style="margin-bottom: 12px;">
        <a href="/index.html">Dashboard</a>
        <a href="/operator.html">Operator</a>
        <a href="/maintenance.html">Maintenance</a>
        <a href="/supervisor.html">Supervisor</a>
    </nav>

    <div id="breadcrumb" class="breadcrumb"></div>
    <h1>Operator Console</h1>
    <div class="subtext">Quick view for a single machine</div>

    <div class="layout">
        <div class="card">
            <div class="field-label">Machine</div>
            <select id="equipmentSelect">
                <option>Loading...</option>
            </select>

            <div class="field-label">Run Status</div>
            <div class="field-value" id="runStatus">--</div>

            <div class="field-label">Alarm Status</div>
            <div class="field-value" id="alarmStatus">--</div>

            <div class="field-label">Availability (1h)</div>
            <div class="field-value" id="availability1h">--</div>

            <div class="field-label">Current Order / SKU</div>
            <div class="field-value" id="orderInfo">--</div>

            <div class="field-label">Order Progress</div>
            <div class="field-value" id="orderProgressText">--</div>
            <div class="progress-bar"><div class="progress-fill" id="orderProgressFill" style="width:0%;"></div></div>
        </div>

        <div class="card">
            <div class="field-label">Assistant</div>
            <button id="askButton" type="button">Ask Assistant</button>
            <div id="lastUpdatedTs" class="last-updated">—</div>
            <div id="assistantBadges" class="assistant-badges"></div>
            <div id="badgeDetail" class="badge-detail"></div>
            <div id="assistantResponse" style="margin-top:6px; max-height:160px; overflow-y:auto; font-size:0.85rem; line-height:1.4;"></div>
        </div>
    </div>

    <script src="/js/assistant-client.js"></script>
    <script src="/js/operator.js"></script>
    <script>
        (function () {
            const SEP = '<span>›</span>';
            const p = new URLSearchParams(window.location.search);
            const eq = p.get("equipment");
            const issue = p.get("issue");
            let html = '<a href="/maintenance.html">Maintenance</a>';
            if (eq) {
                const eqUrl = '/maintenance.html?equipment=' + encodeURIComponent(eq);
                html += SEP + '<a href="' + eqUrl + '">' + eq + '</a>';
                if (issue) {
                    const issueUrl = eqUrl + '&issue=' + encodeURIComponent(issue);
                    const label = issue.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    html += SEP + '<a href="' + issueUrl + '">' + label + '</a>';
                }
            } else {
                html += SEP + 'Operator';
            }
            document.getElementById("breadcrumb").innerHTML = html;
        })();
    </script>
</body>
</html>
